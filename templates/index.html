// ============================================================
// ゴーストカラーキャッシュ
// ============================================================
const _ghostColorCache = {};
function darkenColor(hex, factor = 0.25) {
  if (!hex.startsWith("#")) return "#333333";
  if (_ghostColorCache[hex + factor]) return _ghostColorCache[hex + factor];
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.floor(r * factor); g = Math.floor(g * factor); b = Math.floor(b * factor);
  const result = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  _ghostColorCache[hex + factor] = result;
  return result;
}

// ============================================================
// シーン管理
// ============================================================
let scene = "title";
let prevScene = "game";
let _btnRects = {};

// ============================================================
// クラス定義
// ============================================================
class TutorialState {
  constructor() { this.reset(); }
  currentStepData() {
    return this.stepIdx < TUTORIAL_STEPS.length ? TUTORIAL_STEPS[this.stepIdx] : null;
  }
  reset() {
    this.stepIdx = 0; this.isCleared = false; this.flags = {};
    this.initialVal = 0; this.stepTimer = 0; this._needsSetup = true; this.blockIndex = 0;
  }
  advance() {
    this.stepIdx += 1; this.isCleared = false; this.flags = {};
    this.initialVal = 0; this.stepTimer = 0; this._needsSetup = true;
  }
  setCleared() { this.isCleared = true; }
}

function tutSetupStep(tutState, state, player, fb, beam = null) {
  tutState._needsSetup = false;
  const stepData = tutState.currentStepData();
  if (!stepData) return;
  const stepNum = stepData.step;
  if (stepNum === 2) tutState.initialVal = player.x;
  else if (stepNum === 4) tutState.initialVal = fb.x;
  else if (stepNum === 8) {
    tutState.initialVal = state.score;
    const lastRow = MAP_HEIGHT - 1;
    for (let y = 0; y < MAP_HEIGHT; y++) for (let x = 0; x < MAP_WIDTH; x++) state.blockMap[y][x] = 0;
    for (let x = 0; x < MAP_WIDTH; x++) state.blockMap[lastRow][x] = 1001;
    state.blockMap[lastRow][Math.floor(MAP_WIDTH / 2)] = 0;
    state.blockMap[lastRow][Math.floor(MAP_WIDTH / 2) - 1] = 0;
  } else if (stepNum === 9) {
    tutState.initialVal = player.hp;
    if (beam !== null) { beam.phase = "wait"; beam.timer = BEAM_CYCLE - BEAM_WARNING - 60; }
  }
}

function tutCheckStepCondition(tutState, state, player, fb, beam) {
  tutState.stepTimer += 1;
  if (tutState.isCleared) return;
  const stepData = tutState.currentStepData();
  if (!stepData) return;
  const ctype = stepData.condition_type;
  if (ctype === "wait_input") {
    if (tutState.stepTimer >= 180) tutState.setCleared();
  } else if (ctype === "player_move") {
    if (Math.abs(player.x - tutState.initialVal) > 80) tutState.setCleared();
  } else if (ctype === "player_jump") {
    if (tutState.flags.jumped) tutState.setCleared();
  } else if (ctype === "block_move") {
    if (Math.abs(fb.x - tutState.initialVal) > 0) tutState.setCleared();
  } else if (ctype === "block_rotate") {
    if (tutState.flags.rotated) tutState.setCleared();
  } else if (ctype === "block_speed") {
    if (tutState.flags.down_pressed) tutState.setCleared();
  } else if (ctype === "hard_drop") {
    if (tutState.flags.hard_dropped) tutState.setCleared();
  } else if (ctype === "line_clear") {
    if (state.score > tutState.initialVal) tutState.setCleared();
  } else if (ctype === "beam_evade") {
    if (tutState.flags.beam_fired && player.hp >= tutState.initialVal) tutState.setCleared();
    else if (player.hp < tutState.initialVal) { tutState.flags.beam_fired = false; tutState.initialVal = player.hp; }
  }
}

class GameState {
  constructor() {
    this.blockMap = Array.from({length: MAP_HEIGHT}, () => new Array(MAP_WIDTH).fill(0));
    this.nextSerial = 1;
    this.blockCount = 0;
    this.rareCountdown = Math.floor(Math.random() * 5) + 28;
    this.keyStates = { w:false, a:false, s:false, d:false, space:false, down:false };
    this.lastHkey = "";
    this.score = 0;
    this.floor = 1;
    this.floorLines = 0;
    this.downPressCount = 0;
    this.downDoubleTapTimer = 0;
    
    // Combo & Push System
    this.comboTotalLines = 0;
    this.comboCount = 0;
    this.comboBlocks = 0;
    this.comboTimer = 0;
    this.comboEverActivated = false;
    this.gravityTimer = 0;
    this.pushedBlockIds = new Set();
    this.pushGravityTimer = 0;
    this.lineClearQueue = [];
    this.lineClearTimer = 0;
    this.nextBlockData = null;
  }
  
  getBlockCache() {
    let cache = {};
    for (let y = 0; y < MAP_HEIGHT; y++) {
      for (let x = 0; x < MAP_WIDTH; x++) {
        let bid = this.blockMap[y][x];
        if (bid >= 1) {
          if (!cache[bid]) cache[bid] = [];
          cache[bid].push([x, y]);
        }
      }
    }
    return cache;
  }
}

class FallingBlock {
  constructor() {
    this.x = 0; this.y = 0; this.timer = 0;
    this.shapeId = 1; this.shape = [];
    this.color = "#ffdd00"; this.outline = "#cc9900";
    this.spawnBlock(new GameState(), null, true, false);
  }

  _pickBlockData(state, isTutorial, tutState) {
    if (isTutorial && tutState !== null) {
      let normal = BLOCKS.filter(b => !RARE_BLOCK_IDS.includes(b.shape_id));
      if (normal.length === 0) normal = BLOCKS;
      return normal[tutState.blockIndex % normal.length];
    } else {
      if (RARE_BLOCK_IDS.length > 0 && state.rareCountdown <= 0) {
        const rareId = RARE_BLOCK_IDS[Math.floor(Math.random() * RARE_BLOCK_IDS.length)];
        return BLOCKS.find(b => b.shape_id === rareId);
      } else {
        const normal = BLOCKS.filter(b => !RARE_BLOCK_IDS.includes(b.shape_id));
        return normal.length > 0 ? normal[Math.floor(Math.random() * normal.length)] : BLOCKS[0];
      }
    }
  }

  spawnBlock(state, tutState = null, isInit = false, isTutorial = false) {
    if (!isInit) {
      state.blockCount += 1;
      state.rareCountdown -= 1;
    }
    if (!state.nextBlockData) {
      state.nextBlockData = this._pickBlockData(state, isTutorial, tutState);
    }
    
    let data;
    if (isTutorial && tutState !== null) {
      let normal = BLOCKS.filter(b => !RARE_BLOCK_IDS.includes(b.shape_id));
      if (normal.length === 0) normal = BLOCKS;
      data = normal[tutState.blockIndex % normal.length];
      tutState.blockIndex += 1;
    } else {
      data = state.nextBlockData;
      if (RARE_BLOCK_IDS.length > 0 && state.rareCountdown <= 0) {
        state.rareCountdown = Math.floor(Math.random() * 5) + 28;
      }
    }
    
    state.nextBlockData = this._pickBlockData(state, isTutorial, tutState);

    this.shapeId = data.shape_id;
    this.shape = data.shape.map(([dx,dy]) => [dx,dy]);
    this.color = data.color;
    this.outline = data.outline;
    const maxDx = Math.max(...this.shape.map(([dx]) => dx));
    
    if (isTutorial) this.x = Math.floor((MAP_WIDTH - maxDx) / 2);
    else this.x = Math.floor(Math.random() * (MAP_WIDTH - maxDx - 2)) + 1;
    
    this.y = 0; this.timer = 0;
  }

  getCells() { return this.shape.map(([dx,dy]) => [this.x + dx, this.y + dy]); }

  getGhostCells(state) {
    let ghostY = this.y;
    while (!checkCollision(state, this, this.x, ghostY + 1)) ghostY++;
    if (ghostY === this.y) return [];
    return this.shape.map(([dx,dy]) => [this.x + dx, ghostY + dy]);
  }

  rotateLeft(state) {
    let ns = this.shape.map(([dx,dy]) => [dy, -dx]);
    const minX = Math.min(...ns.map(([dx]) => dx)), minY = Math.min(...ns.map(([,dy]) => dy));
    ns = ns.map(([dx,dy]) => [dx - minX, dy - minY]);
    if (!this._collides(state, ns)) this.shape = ns;
  }

  _collides(state, shape) {
    for (const [dx,dy] of shape) {
      const tx = this.x + dx, ty = this.y + dy;
      if (tx < 0 || tx >= MAP_WIDTH) return true;
      if (ty >= MAP_HEIGHT) return true;
      if (ty >= 0 && ty < MAP_HEIGHT && state.blockMap[ty][tx] >= 1) return true;
    }
    return false;
  }
}

// ============================================================
// ゲームロジック
// ============================================================
function checkCollision(state, fb, nx, ny) {
  for (const [dx,dy] of fb.shape) {
    const tx = nx + dx, ty = ny + dy;
    if (tx < 0 || tx >= MAP_WIDTH || ty >= MAP_HEIGHT) return true;
    if (ty >= 0 && ty < MAP_HEIGHT && state.blockMap[ty][tx] >= 1) return true;
  }
  return false;
}

function lockBlock(state, fb) {
  const mapValue = fb.shapeId * 1000 + state.nextSerial;
  for (const [gx,gy] of fb.getCells()) {
    if (gx >= 0 && gx < MAP_WIDTH && gy >= 0 && gy < MAP_HEIGHT) state.blockMap[gy][gx] = mapValue;
  }
  state.nextSerial += 1;
}

function checkLineClear(state, countCombo = true) {
  let existingRows = new Set(state.lineClearQueue);
  let newFullRows = [];
  for (let y = MAP_HEIGHT - 1; y >= 0; y--) {
    if (!state.blockMap[y].includes(0) && !existingRows.has(y)) {
      newFullRows.push(y);
    }
  }
  if (newFullRows.length === 0) return;

  if (countCombo) {
    let lines = newFullRows.length;
    if (state.comboTimer <= 0) state.comboTotalLines = 0;
    state.comboTotalLines += lines;
    let prevCount = state.comboCount;
    state.comboCount = state.comboTotalLines - 1;
    state.comboTimer = COMBO_BUFFER_FRAMES;

    if (state.comboCount >= 1) {
      state.comboEverActivated = true;
      state.comboBlocks += state.comboCount;
    }
    let prevBonus = Math.floor(Math.max(prevCount - 1, 0) / 4);
    let newBonus = Math.floor(Math.max(state.comboCount - 1, 0) / 4);
    if (newBonus > prevBonus) state.floor += (newBonus - prevBonus);
  }
  for (let row of newFullRows) state.lineClearQueue.push(row);
}

function enqueueNewFullRows(state) {
  let existingRows = new Set(state.lineClearQueue);
  for (let y = MAP_HEIGHT - 1; y >= 0; y--) {
    if (!state.blockMap[y].includes(0) && !existingRows.has(y)) {
      state.lineClearQueue.push(y);
    }
  }
}

function processLineClearQueue(state) {
  if (state.lineClearQueue.length === 0 || state.pushedBlockIds.size > 0) return;
  state.lineClearTimer += 1;
  if (state.lineClearTimer < LINE_CLEAR_INTERVAL) return;
  state.lineClearTimer = 0;

  let row = state.lineClearQueue.shift();
  if (state.blockMap[row].includes(0)) {
    enqueueNewFullRows(state);
    return;
  }

  for (let ty = row; ty > 0; ty--) state.blockMap[ty] = [...state.blockMap[ty - 1]];
  state.blockMap[0] = new Array(MAP_WIDTH).fill(0);
  state.score += SCORE_PER_LINE;
  state.floorLines += 1;
  if (state.floorLines >= LINES_PER_FLOOR) {
    state.floor += 1; state.floorLines = 0;
  }
  state.lineClearQueue = state.lineClearQueue.map(r => r < row ? r - 1 : r);
  enqueueNewFullRows(state);
}

function applyGravityPushOnly(state, fb) {
  if (state.pushedBlockIds.size === 0) return;
  state.pushGravityTimer += 1;
  const interval = state.keyStates.down ? BLOCK_FALL_INTERVAL_FAST : BLOCK_FALL_INTERVAL;
  if (state.pushGravityTimer < interval) return;
  state.pushGravityTimer = 0;

  const fbCells = new Set(fb.getCells().map(c => `${c[0]},${c[1]}`));
  const blockCache = state.getBlockCache();
  
  let existingIds = new Set();
  state.pushedBlockIds.forEach(id => { if(blockCache[id]) existingIds.add(id); });
  state.pushedBlockIds = existingIds;
  if (state.pushedBlockIds.size === 0) return;

  let settledIds = new Set();
  let sortedIds = Array.from(state.pushedBlockIds).sort((a,b)=>a-b);
  
  for (let blockId of sortedIds) {
    let cells = blockCache[blockId];
    let canDrop = true;
    for (let [cx, cy] of cells) {
      let ny = cy + 1;
      if (ny >= MAP_HEIGHT) { canDrop = false; break; }
      if ((state.blockMap[ny][cx] >= 1 && state.blockMap[ny][cx] !== blockId) || fbCells.has(`${cx},${ny}`)) {
        canDrop = false; break;
      }
    }
    if (canDrop && cells.length > 0) {
      cells.sort((a,b) => b[1] - a[1]).forEach(([cx, cy]) => {
        state.blockMap[cy + 1][cx] = blockId;
        state.blockMap[cy][cx] = 0;
      });
    } else {
      settledIds.add(blockId);
    }
  }

  settledIds.forEach(id => state.pushedBlockIds.delete(id));
  if (settledIds.size > 0) checkLineClear(state, true);
}

function useComboBlock(state, fb) {
  if (state.comboBlocks <= 0) return;
  for (let targetGaps = 1; targetGaps < MAP_WIDTH; targetGaps++) {
    for (let y = MAP_HEIGHT - 1; y >= 0; y--) {
      let emptyCols = [];
      for(let x=0; x<MAP_WIDTH; x++) if(state.blockMap[y][x] === 0) emptyCols.push(x);
      if (emptyCols.length === targetGaps) {
        let placeX = emptyCols[Math.floor(emptyCols.length / 2)];
        let mapValue = 1 * 1000 + state.nextSerial;
        state.blockMap[y][placeX] = mapValue;
        state.nextSerial += 1;
        state.comboBlocks -= 1;
        checkLineClear(state, false);
        return;
      }
    }
  }
}

function teleportPlayer(player) {
  player.x = Math.floor((GAME_LEFT + GAME_RIGHT) / 2);
  player.y = GAME_TOP + 100; player.vy = 0; player.isGrounded = false;
}

function checkCrush(state, fb, player) {
  if (player.invincible > 0 || !player.isGrounded) return;
  const headGy = Math.floor((player.y - P_HALF_H - GAME_TOP) / GRID_SIZE);
  const lx = Math.floor((player.x - (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const rx = Math.floor((player.x + (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const fbCells = new Set(fb.getCells().map(([x,y]) => `${x},${y}`));
  for (const cx of [lx, rx]) {
    if (cx < 0 || cx >= MAP_WIDTH) continue;
    if (fbCells.has(`${cx},${headGy}`) || (headGy >= 0 && headGy < MAP_HEIGHT && state.blockMap[headGy][cx] >= 1)) {
      player.hp = Math.max(0, player.hp - 1);
      player.invincible = INVINCIBLE_FRAMES;
      if (player.hp <= 0) scene = "gameover"; else teleportPlayer(player);
      break;
    }
  }
}

function checkCrushHarddrop(state, player) {
  if (player.invincible > 0) return;
  const checkXs = [
    Math.floor((player.x - (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE),
    Math.floor((player.x + (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE)
  ];
  const checkYs = [
    Math.floor((player.y - (P_HALF_H - 2) - GAME_TOP) / GRID_SIZE),
    Math.floor((player.y + (P_HALF_H - 2) - GAME_TOP) / GRID_SIZE)
  ];
  for (const cy of checkYs) for (const cx of checkXs) {
    if (cx < 0 || cx >= MAP_WIDTH || cy < 0 || cy >= MAP_HEIGHT) continue;
    if (state.blockMap[cy][cx] >= 1) {
      player.hp = Math.max(0, player.hp - 1);
      player.invincible = INVINCIBLE_FRAMES;
      if (player.hp <= 0) scene = "gameover"; else teleportPlayer(player);
      return;
    }
  }
}

function updateBeam(beam, player) {
  beam.timer += 1;
  if (beam.phase === "wait" && beam.timer >= BEAM_CYCLE - BEAM_WARNING) {
    beam.phase = "warning";
    const pGx = Math.floor((player.x - GAME_LEFT) / GRID_SIZE);
    beam.col = Math.max(0, Math.min(MAP_WIDTH - BEAM_WIDTH, pGx - Math.floor(BEAM_WIDTH / 2)));
  }
  if (beam.phase === "warning") beam.blinkOn = (Math.floor(beam.timer / 8) % 2 === 0);
  if (beam.phase === "warning" && beam.timer >= BEAM_CYCLE) {
    beam.phase = "firing"; beam.showTimer = BEAM_SHOW_FRAMES; beam.timer = 0;
  }
  if (beam.phase === "firing") {
    beam.showTimer -= 1;
    if (player.invincible === 0) {
      const pGx = Math.floor((player.x - GAME_LEFT) / GRID_SIZE);
      if (beam.col <= pGx && pGx < beam.col + BEAM_WIDTH) {
        player.hp = Math.max(0, player.hp - 1); player.invincible = INVINCIBLE_FRAMES;
        if (player.hp <= 0) scene = "gameover"; else teleportPlayer(player);
      }
    }
    if (beam.showTimer <= 0) beam.phase = "wait";
  }
}

function updateBlockMove(state, fb, bms) {
  if (bms.leftHeld === bms.rightHeld) { bms.holdFrames = 0; bms.repeatAcc = 0; return; }
  const dir = bms.leftHeld ? -1 : 1;
  if (bms.holdFrames === 0 || (bms.holdFrames >= BLOCK_MOVE_INITIAL_DELAY && ++bms.repeatAcc >= BLOCK_MOVE_REPEAT_DELAY)) {
    if (bms.holdFrames > 0) bms.repeatAcc = 0;
    if (!checkCollision(state, fb, fb.x + dir, fb.y)) fb.x += dir;
  }
  bms.holdFrames += 1;
}

function updateFallingBlock(state, fb, isTutorial = false, tutState = null) {
  const interval = state.keyStates.down ? BLOCK_FALL_INTERVAL_FAST : BLOCK_FALL_INTERVAL;
  fb.timer += 1;
  if (fb.timer < interval) return;
  fb.timer = 0;
  if (!checkCollision(state, fb, fb.x, fb.y + 1)) fb.y += 1;
  else {
    lockBlock(state, fb);
    fb.spawnBlock(state, tutState, false, isTutorial);
    checkLineClear(state, true);
  }
}

function isSolidAll(state, fb, gx, gy) {
  if (gx < 0 || gx >= MAP_WIDTH || gy < 0 || gy >= MAP_HEIGHT) return false;
  if (state.blockMap[gy][gx] >= 1) return true;
  for (const [fx,fy] of fb.getCells()) if (fx === gx && fy === gy) return true;
  return false;
}

function updatePlayer(state, fb, player) {
  const ks = state.keyStates;
  player.vx = 0;
  if (ks.a && ks.d) player.vx = (state.lastHkey === "a") ? -MOVE_SPEED : MOVE_SPEED;
  else if (ks.a) player.vx = -MOVE_SPEED;
  else if (ks.d) player.vx = MOVE_SPEED;

  const upperY = Math.floor((player.y - (P_HALF_H - 1) - GAME_TOP) / GRID_SIZE);
  const lowerY = Math.floor((player.y + (P_HALF_H - 1) - GAME_TOP) / GRID_SIZE);
  const nextLx = Math.floor((player.x + player.vx - (P_HALF_W - 1) - GAME_LEFT) / GRID_SIZE);
  const nextRx = Math.floor((player.x + player.vx + (P_HALF_W - 1) - GAME_LEFT) / GRID_SIZE);

  let hittingBlock = false;
  let blockCache = null;

  for (const gridY of [upperY, lowerY]) {
    if (gridY < 0 || gridY >= MAP_HEIGHT) continue;
    
    if (player.vx < 0 && nextLx >= 0 && nextLx < MAP_WIDTH && state.blockMap[gridY][nextLx] >= 1) {
      hittingBlock = true;
      const targetId = state.blockMap[gridY][nextLx];
      if (!blockCache) blockCache = state.getBlockCache();
      const cells = blockCache[targetId] || [];
      const canPush = cells.every(([cx,cy]) => cx - 1 >= 0 && (state.blockMap[cy][cx-1] === 0 || state.blockMap[cy][cx-1] === targetId));
      player.pushTimerR = 0;
      if (canPush) {
        player.pushTimerL += 1;
        if (player.pushTimerL >= PUSH_DELAY) {
          cells.sort((a,b) => a[0]-b[0]).forEach(([cx,cy]) => { state.blockMap[cy][cx-1] = targetId; state.blockMap[cy][cx] = 0; });
          player.pushTimerL = 0; state.pushedBlockIds.add(targetId); state.pushGravityTimer = 0;
        } else player.vx = 0;
      } else player.vx = 0;
      break;
    }
    
    if (player.vx > 0 && nextRx >= 0 && nextRx < MAP_WIDTH && state.blockMap[gridY][nextRx] >= 1) {
      hittingBlock = true;
      const targetId = state.blockMap[gridY][nextRx];
      if (!blockCache) blockCache = state.getBlockCache();
      const cells = blockCache[targetId] || [];
      const canPush = cells.every(([cx,cy]) => cx + 1 < MAP_WIDTH && (state.blockMap[cy][cx+1] === 0 || state.blockMap[cy][cx+1] === targetId));
      player.pushTimerL = 0;
      if (canPush) {
        player.pushTimerR += 1;
        if (player.pushTimerR >= PUSH_DELAY) {
          cells.sort((a,b) => b[0]-a[0]).forEach(([cx,cy]) => { state.blockMap[cy][cx+1] = targetId; state.blockMap[cy][cx] = 0; });
          player.pushTimerR = 0; state.pushedBlockIds.add(targetId); state.pushGravityTimer = 0;
        } else player.vx = 0;
      } else player.vx = 0;
      break;
    }
  }

  player.x += player.vx;
  if (!hittingBlock) { player.pushTimerL = 0; player.pushTimerR = 0; }
  player.x = Math.max(GAME_LEFT + P_HALF_W, Math.min(GAME_RIGHT - P_HALF_W, player.x));

  if (!player.isGrounded) player.vy += GRAVITY;
  else { player.vy = 0; if (ks.w) { player.vy = JUMP_SPEED; player.isGrounded = false; } }

  player.y += player.vy;
  player.isGrounded = false;

  const lfootX = Math.floor((player.x - (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const rfootX = Math.floor((player.x + (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const headGy = Math.floor((player.y - P_HALF_H - GAME_TOP) / GRID_SIZE);
  const footGy = Math.floor((player.y + P_HALF_H - GAME_TOP) / GRID_SIZE);

  for (const cx of [lfootX, rfootX]) {
    if (cx < 0 || cx >= MAP_WIDTH) continue;
    if (player.vy >= 0 && footGy >= 0 && footGy < MAP_HEIGHT && isSolidAll(state, fb, cx, footGy)) {
      player.y = footGy * GRID_SIZE + GAME_TOP - P_HALF_H; player.isGrounded = true; break;
    }
    if (player.vy < 0 && headGy >= 0 && headGy < MAP_HEIGHT && isSolidAll(state, fb, cx, headGy)) {
      player.y = (headGy + 1) * GRID_SIZE + GAME_TOP + P_HALF_H; player.vy = 0; break;
    }
  }
  if (player.y > GAME_BOTTOM - P_HALF_H) { player.y = GAME_BOTTOM - P_HALF_H; player.isGrounded = true; }

  if (player.invincible > 0) {
    player.invincible -= 1; player.blinkVisible = (Math.floor(player.invincible / 6) % 2 === 0);
  } else player.blinkVisible = true;
}

// ============================================================
// 描画関数
// ============================================================
function drawNextBlock(ctx, state) {
  if (!state.nextBlockData) return;
  const mapLeftX = GAME_RIGHT + 80; const mapRightX = SCREEN_WIDTH - 80;
  const centerX = Math.floor((mapLeftX + mapRightX) / 2);
  const areaTop = GAME_TOP + 20; const areaH = 180;

  ctx.fillStyle = "#aaaaaa"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
  ctx.fillText("NEXT", centerX, areaTop + 35);

  const ndata = state.nextBlockData;
  const cellSize = 32;
  const minDx = Math.min(...ndata.shape.map(([dx]) => dx));
  const minDy = Math.min(...ndata.shape.map(([,dy]) => dy));
  const maxDx = Math.max(...ndata.shape.map(([dx]) => dx));
  const maxDy = Math.max(...ndata.shape.map(([,dy]) => dy));
  const blockW = (maxDx - minDx + 1) * cellSize;
  const blockH = (maxDy - minDy + 1) * cellSize;

  const originX = centerX - blockW / 2 - minDx * cellSize;
  const originY = areaTop + 50 + (areaH - 50 - blockH) / 2 - minDy * cellSize;

  for (const [dx, dy] of ndata.shape) {
    ctx.fillStyle = ndata.color;
    ctx.fillRect(originX + dx * cellSize, originY + dy * cellSize, cellSize, cellSize);
    ctx.strokeStyle = ndata.outline; ctx.lineWidth = 1;
    ctx.strokeRect(originX + dx * cellSize, originY + dy * cellSize, cellSize, cellSize);
  }

  ctx.strokeStyle = "#555555"; ctx.lineWidth = 1;
  ctx.strokeRect(mapLeftX, areaTop, mapRightX - mapLeftX, areaH);
}

function drawGame(ctx, state, fb, player, beam) {
  ctx.strokeStyle = "#333333"; ctx.lineWidth = 1; ctx.setLineDash([8, 10]);
  for (let gx = 0; gx <= MAP_WIDTH; gx++) {
    const x = GAME_LEFT + gx * GRID_SIZE;
    ctx.beginPath(); ctx.moveTo(x, GAME_TOP); ctx.lineTo(x, GAME_BOTTOM); ctx.stroke();
  }
  for (let gy = 0; gy <= MAP_HEIGHT; gy++) {
    const y = GAME_TOP + gy * GRID_SIZE;
    ctx.beginPath(); ctx.moveTo(GAME_LEFT, y); ctx.lineTo(GAME_RIGHT, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  if (beam.phase === "warning" && beam.blinkOn) {
    ctx.fillStyle = "#550000";
    ctx.fillRect(GAME_LEFT + beam.col * GRID_SIZE, GAME_TOP, BEAM_WIDTH * GRID_SIZE, GAME_BOTTOM - GAME_TOP);
  }
  if (beam.phase === "firing") {
    const bx = GAME_LEFT + beam.col * GRID_SIZE;
    ctx.fillStyle = "#ff2200";
    ctx.fillRect(bx, GAME_TOP, BEAM_WIDTH * GRID_SIZE, GAME_BOTTOM - GAME_TOP);
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(bx + 4, GAME_TOP, BEAM_WIDTH * GRID_SIZE - 8, GAME_BOTTOM - GAME_TOP);
  }

  for (let y = 0; y < MAP_HEIGHT; y++) {
    for (let x = 0; x < MAP_WIDTH; x++) {
      const val = state.blockMap[y][x];
      if (val >= 1) {
        const shapeId = Math.floor(val / 1000);
        const col = BLOCK_COLOR_MAP[shapeId] || { fill:"#888888", outline:"#444444" };
        ctx.fillStyle = col.fill;
        ctx.fillRect(GAME_LEFT + x * GRID_SIZE, GAME_TOP + y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = col.outline; ctx.lineWidth = 1;
        ctx.strokeRect(GAME_LEFT + x * GRID_SIZE, GAME_TOP + y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
      }
    }
  }

  const ghostCells = fb.getGhostCells(state);
  if (ghostCells.length > 0) {
    const ghostFill = darkenColor(fb.color, 0.28);
    const ghostOutline = darkenColor(fb.outline || fb.color, 0.45);
    const fbCellSet = new Set(fb.getCells().map(([x,y]) => `${x},${y}`));
    for (const [gx,gy] of ghostCells) {
      if (fbCellSet.has(`${gx},${gy}`)) continue;
      ctx.fillStyle = ghostFill;
      ctx.fillRect(GAME_LEFT + gx * GRID_SIZE + 2, GAME_TOP + gy * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
      ctx.strokeStyle = ghostOutline; ctx.lineWidth = 2;
      ctx.strokeRect(GAME_LEFT + gx * GRID_SIZE + 2, GAME_TOP + gy * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
    }
  }

  for (const [gx,gy] of fb.getCells()) {
    ctx.fillStyle = fb.color;
    ctx.fillRect(GAME_LEFT + gx * GRID_SIZE, GAME_TOP + gy * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    ctx.strokeStyle = fb.outline; ctx.lineWidth = 1;
    ctx.strokeRect(GAME_LEFT + gx * GRID_SIZE, GAME_TOP + gy * GRID_SIZE, GRID_SIZE, GRID_SIZE);
  }

  if (player.blinkVisible) {
    ctx.fillStyle = player.invincible > 0 ? "#ffaaaa" : "lightgreen";
    ctx.fillRect(player.x - P_HALF_W, player.y - P_HALF_H, P_HALF_W * 2, P_HALF_H * 2);
    ctx.strokeStyle = "white"; ctx.lineWidth = 1;
    ctx.strokeRect(player.x - P_HALF_W, player.y - P_HALF_H, P_HALF_W * 2, P_HALF_H * 2);
  }

  if (beam.phase === "warning") {
    const remainSec = Math.max(0, (BEAM_CYCLE - beam.timer) / 60).toFixed(1);
    ctx.fillStyle = "#111111";
    ctx.fillRect((GAME_LEFT + GAME_RIGHT) / 2 - 300, GAME_TOP + 20, 600, 90);
    ctx.strokeStyle = "#ff3333"; ctx.lineWidth = 2;
    ctx.strokeRect((GAME_LEFT + GAME_RIGHT) / 2 - 300, GAME_TOP + 20, 600, 90);
    ctx.fillStyle = "#ff3333"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
    ctx.fillText(`⚠ WARNING: BEAM INBOUND (${remainSec}s) ⚠`, (GAME_LEFT + GAME_RIGHT) / 2, GAME_TOP + 72);
  }

  const cx = Math.floor((40 + GAME_LEFT - 40) / 2);
  ctx.fillStyle = "white"; ctx.font = "bold 28px Arial"; ctx.textAlign = "center";
  ctx.fillText("SCORE", cx, GAME_TOP + 80);
  ctx.fillText(state.score, cx, GAME_TOP + 120);

  if (state.comboEverActivated) {
    if (state.comboCount >= 1) {
      ctx.fillStyle = "#ff4400"; ctx.font = "bold 40px Arial";
      ctx.fillText(`${state.comboCount} COMBO!!`, cx, GAME_TOP + 260);
    }
    ctx.fillStyle = "#ffcc00"; ctx.font = "bold 18px Arial";
    ctx.fillText("COMBO BLOCKS", cx, GAME_TOP + 340);
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 64px Arial";
    ctx.fillText(`${state.comboBlocks}`, cx, GAME_TOP + 410);
    if (state.comboCount >= 1) {
      ctx.fillStyle = "#aaffaa"; ctx.font = "bold 20px Arial";
      ctx.fillText(`REMAIN: ${(state.comboTimer / 60).toFixed(1)}s`, cx, GAME_TOP + 510);
    }
    ctx.fillStyle = "#00eeff"; ctx.font = "bold 15px Arial";
    ctx.fillText("[E] コンボブロック使用", cx, GAME_TOP + 570);
  } else {
    const controls = [
      "CONTROLS","", "＜ プレイヤー操作 ＞", "[A] / [D] : ← / →", "[W] : ジャンプ","",
      "＜ ブロック操作 ＞", "[↓] / [中クリック] : 落下速度UP", "（2回押しで即落下）","",
      "[←] / [→] : ブロック移動", "[左クリ] : 左移動", "[右クリ] : 右移動",
      "（長押しで連続移動）", "[Space] : 回転", "[Esc] : ポーズ"
    ];
    ctx.fillStyle = "#aaaaaa"; ctx.font = "bold 14px Arial";
    controls.forEach((line, i) => ctx.fillText(line, cx, GAME_TOP + 220 + i * 22));
  }

  const hpY = GAME_BOTTOM - 120;
  ctx.fillStyle = "cyan"; ctx.font = "bold 16px Arial";
  ctx.fillText("PLAYER HEALTH", cx, hpY - 40);
  for (let i = 0; i < MAX_HP; i++) {
    const sx = cx - (MAX_HP - 1) * 25;
    ctx.fillStyle = i < player.hp ? "#ff3333" : "#444444";
    ctx.font = "bold 38px Arial";
    ctx.fillText("♥", sx + i * 50, hpY + 10);
  }

  const mapLeftX = GAME_RIGHT + 80, mapRightX = SCREEN_WIDTH - 80, mapCenterX = Math.floor((mapLeftX + mapRightX) / 2);
  const baseY = 960, floorGap = 140, startF = Math.max(1, state.floor - 1), endF = startF + 5;
  for (let f = startF; f <= endF; f++) {
    const fy = baseY - (f - startF) * floorGap;
    if (fy < GAME_TOP + 230) continue;
    const lineCol = f === state.floor ? "yellow" : "#444444", textCol = f === state.floor ? "yellow" : "gray";
    ctx.strokeStyle = lineCol; ctx.lineWidth = 2; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(mapLeftX + 80, fy); ctx.lineTo(mapRightX - 100, fy); ctx.stroke();
    ctx.fillStyle = textCol; ctx.font = "bold 24px Arial"; ctx.textAlign = "left";
    ctx.fillText(`${f} F`, mapLeftX + 30, fy + 8);
    if (f === state.floor) {
      const indY = fy - Math.floor((state.floorLines / LINES_PER_FLOOR) * floorGap);
      ctx.fillStyle = "#ff3333"; ctx.font = "bold 16px Arial"; ctx.textAlign = "right";
      ctx.fillText("◆ NOW", mapRightX - 40, indY + 5);
      ctx.fillStyle = "lightgreen"; ctx.font = "italic 12px Arial"; ctx.textAlign = "center";
      ctx.fillText(`ASCENT PROGRESS: ${state.floorLines} / ${LINES_PER_FLOOR} LINES`, mapCenterX, fy + 30);
    }
  }

  drawNextBlock(ctx, state);

  ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.strokeRect(GAME_LEFT, GAME_TOP, GAME_RIGHT - GAME_LEFT, GAME_BOTTOM - GAME_TOP);
  ctx.strokeStyle = "cyan"; ctx.lineWidth = 1;
  ctx.strokeRect(40, GAME_TOP, GAME_LEFT - 80, GAME_BOTTOM - GAME_TOP);
  ctx.strokeStyle = "yellow"; ctx.lineWidth = 2;
  ctx.strokeRect(GAME_RIGHT + 40, GAME_TOP, SCREEN_WIDTH - GAME_RIGHT - 80, GAME_BOTTOM - GAME_TOP);
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split("\n");
  const totalLines = paragraphs.length;
  const startY = y - ((totalLines - 1) * lineHeight) / 2;
  paragraphs.forEach((line, i) => ctx.fillText(line, x, startY + i * lineHeight));
}

function tutDrawOverlay(ctx, tutState, width, height, gameLeft, gameTop, gameRight, gameBottom) {
  const stepData = tutState.currentStepData();
  if (!stepData) return;
  const cx = width / 2;

  const highlight = stepData.highlight;
  if (highlight === "ui") {
    if (Math.floor(tutState.stepTimer / 20) % 2 === 0) {
      ctx.strokeStyle = "yellow"; ctx.lineWidth = 6;
      ctx.strokeRect(40, gameTop, gameLeft - 80, gameBottom - gameTop);
      ctx.strokeRect(gameRight + 40, gameTop, width - gameRight - 80, gameBottom - gameTop);
    }
  } else if (highlight === "warning") {
    ctx.strokeStyle = "yellow"; ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
    ctx.strokeRect(cx - 300, gameTop + 20, 600, 90); ctx.setLineDash([]);
  } else if (highlight === "player") {
    ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 4; ctx.setLineDash([12, 8]);
    ctx.strokeRect(gameLeft, gameTop, gameRight - gameLeft, gameBottom - gameTop); ctx.setLineDash([]);
  } else if (highlight === "block") {
    ctx.strokeStyle = "#ffaa00"; ctx.lineWidth = 4; ctx.setLineDash([12, 8]);
    ctx.strokeRect(gameLeft, gameTop, gameRight - gameLeft, 200); ctx.setLineDash([]);
  }

  const panelW = 820, panelH = 170, panelX0 = cx - panelW / 2, panelY0 = gameTop + 130, panelY1 = panelY0 + panelH;
  ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(panelX0, panelY0, panelW, panelH);
  ctx.strokeStyle = "#00eeff"; ctx.lineWidth = 2; ctx.strokeRect(panelX0, panelY0, panelW, panelH);
  ctx.fillStyle = "#00eeff"; ctx.font = "bold 14px Arial"; ctx.textAlign = "left";
  ctx.fillText(`STEP ${stepData.step} / ${TUTORIAL_STEPS.length}`, panelX0 + 16, panelY0 + 24);

  const textY = panelY0 + panelH / 2 - (tutState.isCleared ? 18 : 0);
  ctx.fillStyle = "#ffffff"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
  wrapText(ctx, stepData.text, cx, textY, panelW - 40, 24);

  if (tutState.isCleared) {
    const promptText = stepData.condition_type === "wait_input" ? "▶ Fキーで次へ" : "▶ 達成！ Fキーで次へ";
    ctx.fillStyle = "#ffff00"; ctx.font = "bold 15px Arial"; ctx.textAlign = "center";
    ctx.fillText(promptText, cx, panelY1 - 18);
  }
}

function drawTitle(ctx) {
  const W = SCREEN_WIDTH, H = SCREEN_HEIGHT, cx = W / 2;
  ctx.fillStyle = "#111122"; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = "#334455"; ctx.lineWidth = 2; ctx.strokeRect(cx - 480, 60, 960, H - 120);

  ctx.fillStyle = "#00eeff"; ctx.font = "bold 72px Arial"; ctx.textAlign = "center";
  ctx.fillText("GRID TOWER", cx, 230);
  ctx.fillStyle = "#aaaacc"; ctx.font = "24px Arial"; ctx.fillText("～目指せ100F～", cx, 300);

  const btnW = 400, btnH = 70, gap = 30, startY = (H - (4 * btnH + 3 * gap)) / 2 + 80;
  const buttons = [
    ["PLAY", "#22aa55", "#ffffff", "btn_play"],
    ["HARD MODE", "#aa3322", "#ffffff", "btn_hard"],
    ["TUTORIAL", "#225588", "#ffffff", "btn_tutorial"],
    ["QUIT GAME", "#444444", "#aaaaaa", "btn_quit"]
  ];
  _btnRects = {};
  buttons.forEach(([label, bg, fg, tag], i) => {
    const y0 = startY + i * (btnH + gap);
    ctx.fillStyle = bg; ctx.fillRect(cx - btnW / 2, y0, btnW, btnH);
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1; ctx.strokeRect(cx - btnW / 2, y0, btnW, btnH);
    ctx.fillStyle = fg; ctx.font = "bold 28px Arial"; ctx.textAlign = "center";
    ctx.fillText(label, cx, y0 + btnH / 2 + 10);
    _btnRects[tag] = { x: cx - btnW / 2, y: y0, w: btnW, h: btnH };
  });
  ctx.fillStyle = "#445566"; ctx.font = "14px Arial"; ctx.fillText("© 2026  TETRIS x ACTION", cx, H - 80);
}

function drawPause(ctx) {
  const W = SCREEN_WIDTH, H = SCREEN_HEIGHT, cx = W / 2;
  ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, W, H);
  const pw = 500, ph = 520, px0 = cx - pw / 2, py0 = H / 2 - ph / 2;
  ctx.fillStyle = "#1a1a2e"; ctx.fillRect(px0, py0, pw, ph);
  ctx.strokeStyle = "#00eeff"; ctx.lineWidth = 3; ctx.strokeRect(px0, py0, pw, ph);
  ctx.fillStyle = "#00eeff"; ctx.font = "bold 48px Arial"; ctx.textAlign = "center";
  ctx.fillText("PAUSE", cx, py0 + 90);

  const btnW = 360, btnH = 65, gap = 20, startY = py0 + 160;
  const buttons = [
    ["RESUME", "#22aa55", "#ffffff", "btn_resume"],
    ["RETRY", "#cc8800", "#ffffff", "btn_retry_pause"],
    ["HOME", "#225588", "#ffffff", "btn_home_pause"],
    ["QUIT GAME", "#553333", "#ffaaaa", "btn_quit_pause"]
  ];
  _btnRects = {};
  buttons.forEach(([label, bg, fg, tag], i) => {
    const y0 = startY + i * (btnH + gap);
    ctx.fillStyle = bg; ctx.fillRect(cx - btnW / 2, y0, btnW, btnH);
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1; ctx.strokeRect(cx - btnW / 2, y0, btnW, btnH);
    ctx.fillStyle = fg; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
    ctx.fillText(label, cx, y0 + btnH / 2 + 9);
    _btnRects[tag] = { x: cx - btnW / 2, y: y0, w: btnW, h: btnH };
  });
}

function drawGameover(ctx, score, floorReached) {
  const W = SCREEN_WIDTH, H = SCREEN_HEIGHT, cx = W / 2;
  ctx.fillStyle = "#0d0000"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#ff2200"; ctx.font = "bold 80px Arial"; ctx.textAlign = "center";
  ctx.fillText("GAME OVER", cx, H / 2 - 230);
  ctx.fillStyle = "#ffffff"; ctx.font = "bold 36px Arial";
  ctx.fillText(`SCORE  :  ${score}`, cx, H / 2 - 110);
  ctx.fillStyle = "#aaaaaa"; ctx.font = "28px Arial";
  ctx.fillText(`FLOOR REACHED  :  ${floorReached} F`, cx, H / 2 - 50);

  const btnW = 400, btnH = 70, gap = 24, startY = H / 2 + 20;
  const buttons = [
    ["RETRY", "#cc4400", "#ffffff", "btn_retry_go"],
    ["HOME", "#225588", "#ffffff", "btn_home_go"],
    ["QUIT GAME", "#333333", "#aaaaaa", "btn_quit_go"]
  ];
  _btnRects = {};
  buttons.forEach(([label, bg, fg, tag], i) => {
    const y0 = startY + i * (btnH + gap);
    ctx.fillStyle = bg; ctx.fillRect(cx - btnW / 2, y0, btnW, btnH);
    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1; ctx.strokeRect(cx - btnW / 2, y0, btnW, btnH);
    ctx.fillStyle = fg; ctx.font = "bold 28px Arial"; ctx.textAlign = "center";
    ctx.fillText(label, cx, y0 + btnH / 2 + 10);
    _btnRects[tag] = { x: cx - btnW / 2, y: y0, w: btnW, h: btnH };
  });
}

function hitBtn(tag, cx, cy) {
  if (!_btnRects[tag]) return false;
  const r = _btnRects[tag]; return cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h;
}

// ============================================================
// メインループ
// ============================================================
let state, tutState, fb, player, beam, bms;
function resetGame() {
  state = new GameState(); tutState = new TutorialState(); fb = new FallingBlock();
  player = new Player(); beam = new BeamState(); bms = new BlockMoveState();
}
resetGame();

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const TARGET_FPS = 60, FRAME_INTERVAL = 1000 / TARGET_FPS;
let _lastTime = null, _accumulator = 0;

function mainProc(timestamp) {
  requestAnimationFrame(mainProc);
  if (_lastTime === null) _lastTime = timestamp;
  _accumulator += timestamp - _lastTime; _lastTime = timestamp;
  if (_accumulator < FRAME_INTERVAL) return;
  _accumulator = Math.min(_accumulator, FRAME_INTERVAL * 2) - FRAME_INTERVAL;

  ctx.clearRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
  ctx.fillStyle = "#111122"; ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

  if (scene === "title") drawTitle(ctx);
  else if (scene === "game" || scene === "tutorial") {
    const isTut = (scene === "tutorial");
    if (isTut) {
      if (tutState._needsSetup) tutSetupStep(tutState, state, player, fb, beam);
      const stepData = tutState.currentStepData();
      if (stepData && stepData.condition_type !== "beam_evade") beam.timer = 0;
      else if (stepData && beam.phase === "firing" && beam.showTimer === 1) tutState.flags.beam_fired = true;
    }

    if (state.downDoubleTapTimer > 0 && --state.downDoubleTapTimer <= 0) state.downPressCount = 0;
    if (state.comboTimer > 0 && --state.comboTimer <= 0) {
      state.comboTimer = 0; state.comboCount = 0; state.comboTotalLines = 0;
    }

    processLineClearQueue(state);
    updateBlockMove(state, fb, bms);
    updateFallingBlock(state, fb, isTut, isTut ? tutState : null);
    updatePlayer(state, fb, player);
    applyGravityPushOnly(state, fb);
    checkCrush(state, fb, player);
    updateBeam(beam, player);

    if (isTut) tutCheckStepCondition(tutState, state, player, fb, beam);

    drawGame(ctx, state, fb, player, beam);
    if (isTut) tutDrawOverlay(ctx, tutState, SCREEN_WIDTH, SCREEN_HEIGHT, GAME_LEFT, GAME_TOP, GAME_RIGHT, GAME_BOTTOM);
  } else if (scene === "pause") {
    drawGame(ctx, state, fb, player, beam); drawPause(ctx);
  } else if (scene === "gameover") {
    drawGameover(ctx, state.score, state.floor);
  }
}

// ============================================================
// 入力ハンドラ
// ============================================================
function getKey(code) {
  const map = { "KeyW":"w","KeyA":"a","KeyS":"s","KeyD":"d","KeyE":"e", "ArrowLeft":"left","ArrowRight":"right","ArrowDown":"down","ArrowUp":"up", "Space":"space","Escape":"escape","KeyF":"f" };
  return map[code] || code.toLowerCase().replace("key","");
}

document.addEventListener("keydown", e => {
  const sym = getKey(e.code);
  if (["space","down","up","left","right"].includes(sym)) e.preventDefault();
  if (scene === "title" || scene === "gameover") return;
  if (scene === "pause") { if (sym === "escape") scene = prevScene; return; }
  
  if (scene === "game" || scene === "tutorial") {
    if (sym === "escape") { prevScene = scene; scene = "pause"; return; }
  }

  if (scene === "tutorial") {
    const stepData = tutState.currentStepData();
    if (!stepData) return;
    if ((tutState.isCleared || stepData.condition_type === "wait_input") && sym === "f") {
      tutState.advance();
      if (!tutState.currentStepData()) { resetGame(); scene = "game"; }
      else tutSetupStep(tutState, state, player, fb, beam);
      return;
    }
    const allowed = stepData.allowed_keys || [];
    if (!allowed.includes("all") && !allowed.includes(sym)) return;
    if (sym === "w") tutState.flags.jumped = true;
    if (sym === "down") tutState.flags.down_pressed = true;
    if (sym === "space") tutState.flags.rotated = true;
  }

  if (scene === "game" || scene === "tutorial") {
    if (sym === "e") { useComboBlock(state, fb); return; }
    if (sym === "down" && !state.keyStates.down) {
      if (state.downDoubleTapTimer > 0) {
        if (++state.downPressCount >= 2) {
          while (!checkCollision(state, fb, fb.x, fb.y + 1)) fb.y++;
          lockBlock(state, fb);
          const isTut = (scene === "tutorial");
          fb.spawnBlock(state, isTut ? tutState : null, false, isTut);
          checkLineClear(state, true);
          checkCrushHarddrop(state, player);
          state.downPressCount = 0; state.downDoubleTapTimer = 0;
          if (isTut) tutState.flags.hard_dropped = true;
        }
      } else { state.downPressCount = 1; state.downDoubleTapTimer = 15; }
    }
    if (sym in state.keyStates) state.keyStates[sym] = true;
    if (sym === "a" || sym === "d") state.lastHkey = sym;
    if (sym === "space") fb.rotateLeft(state);
    if (sym === "left") { if (!bms.leftHeld) { bms.leftHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; } bms.rightHeld = false; }
    if (sym === "right") { if (!bms.rightHeld) { bms.rightHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; } bms.leftHeld = false; }
  }
});

document.addEventListener("keyup", e => {
  const sym = getKey(e.code);
  if (scene !== "game" && scene !== "tutorial") return;
  if (sym in state.keyStates) state.keyStates[sym] = false;
  if (sym === "left") { bms.leftHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
  if (sym === "right") { bms.rightHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
});

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: (e.clientX - rect.left) * (SCREEN_WIDTH / rect.width), y: (e.clientY - rect.top) * (SCREEN_HEIGHT / rect.height) };
}

canvas.addEventListener("mousedown", e => {
  e.preventDefault();
  const { x, y } = getCanvasPos(e);
  if (e.button === 0) {
    if (scene === "title") {
      if (hitBtn("btn_play", x, y)) { resetGame(); scene = "game"; }
      else if (hitBtn("btn_tutorial", x, y)) { resetGame(); tutState.reset(); tutSetupStep(tutState, state, player, fb, beam); scene = "tutorial"; }
      return;
    }
    if (scene === "pause") {
      if (hitBtn("btn_resume", x, y)) scene = prevScene;
      else if (hitBtn("btn_retry_pause", x, y)) {
        resetGame();
        if (prevScene === "tutorial") { tutState.reset(); tutSetupStep(tutState, state, player, fb, beam); scene = "tutorial"; }
        else scene = "game";
      }
      else if (hitBtn("btn_home_pause", x, y)) scene = "title";
      return;
    }
    if (scene === "gameover") {
      if (hitBtn("btn_retry_go", x, y)) { resetGame(); scene = "game"; }
      else if (hitBtn("btn_home_go", x, y)) scene = "title";
      return;
    }
    if (scene === "game" || scene === "tutorial") {
      if (!bms.leftHeld) { bms.leftHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; }
      bms.rightHeld = false;
    }
  }
  if (e.button === 1 && (scene === "game" || scene === "tutorial")) {
    if (!state.keyStates.down) {
      if (state.downDoubleTapTimer > 0) {
        if (++state.downPressCount >= 2) {
          while (!checkCollision(state, fb, fb.x, fb.y + 1)) fb.y++;
          lockBlock(state, fb);
          const isTut = (scene === "tutorial");
          fb.spawnBlock(state, isTut ? tutState : null, false, isTut);
          checkLineClear(state, true);
          checkCrushHarddrop(state, player);
          state.downPressCount = 0; state.downDoubleTapTimer = 0;
          if (isTut) tutState.flags.hard_dropped = true;
        }
      } else { state.downPressCount = 1; state.downDoubleTapTimer = 15; }
    }
    state.keyStates.down = true;
  }
  if (e.button === 2 && (scene === "game" || scene === "tutorial")) {
    if (!bms.rightHeld) { bms.rightHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; }
    bms.leftHeld = false;
  }
});

canvas.addEventListener("mouseup", e => {
  if (e.button === 0 && (scene === "game" || scene === "tutorial")) { bms.leftHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
  if (e.button === 1 && (scene === "game" || scene === "tutorial")) state.keyStates.down = false;
  if (e.button === 2 && (scene === "game" || scene === "tutorial")) { bms.rightHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
});
canvas.addEventListener("contextmenu", e => e.preventDefault());

function scaleCanvas() {
  const scale = Math.min(window.innerWidth / SCREEN_WIDTH, window.innerHeight / SCREEN_HEIGHT);
  document.getElementById("wrapper").style.transform = `scale(${scale})`;
}
window.addEventListener("resize", scaleCanvas);
scaleCanvas();
requestAnimationFrame(mainProc);
</script>
