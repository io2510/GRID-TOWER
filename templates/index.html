      let ny = cy + 1; if (ny >= MAP_HEIGHT) { canDrop = false; break; }
      if ((state.blockMap[ny][cx] >= 1 && state.blockMap[ny][cx] !== blockId) || fbCells.has(`${cx},${ny}`)) { canDrop = false; break; }
    }
    if (canDrop && cells.length > 0) {
      cells.sort((a,b) => b[1] - a[1]).forEach(([cx, cy]) => { state.blockMap[cy + 1][cx] = blockId; state.blockMap[cy][cx] = 0; });
    } else settledIds.add(blockId);
  }
  let movedIds = new Set(Array.from(state.pushedBlockIds).filter(id => !settledIds.has(id)));
  movedIds.forEach(blockId => {
    let cells = blockCache[blockId] || [], topCells = {};
    for (const [cx, cy] of cells) { if (!(cx in topCells) || cy < topCells[cx]) topCells[cx] = cy; }
    for (const cx in topCells) {
      let ay = topCells[cx] - 1; if (ay >= 0) { let aboveId = state.blockMap[ay][cx]; if (aboveId >= 1 && aboveId !== blockId) state.pushedBlockIds.add(aboveId); }
    }
  });
  settledIds.forEach(id => state.pushedBlockIds.delete(id));
  if (movedIds.size > 0) fb.timer = interval; if (settledIds.size > 0) checkLineClear(state, true);
}

function useComboBlock(state, fb) {
  if (state.comboBlocks <= 0 || scene.startsWith("boss_")) return;
  for (let gaps = 1; gaps < MAP_WIDTH; gaps++) {
    for (let y = MAP_HEIGHT - 1; y >= 0; y--) {
      if (state.blockMap[y].includes(9999)) continue;
      let emptyCols = []; for (let x=0; x<MAP_WIDTH; x++) if (state.blockMap[y][x] === 0) emptyCols.push(x);
      if (emptyCols.length === gaps) {
        let px = emptyCols[Math.floor(emptyCols.length / 2)], mapValue = 1 * 1000 + state.nextSerial;
        state.blockMap[y][px] = mapValue; state.nextSerial += 1; state.comboBlocks -= 1; checkLineClear(state, false); return;
      }
    }
  }
}

function teleportPlayer(p) { p.x = Math.floor((GAME_LEFT + GAME_RIGHT) / 2); p.y = GAME_TOP + 100; p.vy = 0; p.isGrounded = false; }
function teleportPlayerBoss20(p) { p.x = GAME_LEFT + 8 * GRID_SIZE; p.y = GAME_BOTTOM - P_HALF_H; p.vy = 0; p.isGrounded = false; }

function applyPlayerDamage(p) {
  p.hp = Math.max(0, p.hp - 1); p.invincible = INVINCIBLE_FRAMES;
  if (p.hp <= 0) scene = "gameover";
  else if (scene === "boss_20f" || scene === "boss_40f") teleportPlayerBoss20(p);
  else teleportPlayer(p);
}

function checkCrush(state, fb, p) {
  if (p.invincible > 0 || !p.isGrounded) return;
  const headGy = Math.floor((p.y - P_HALF_H - GAME_TOP) / GRID_SIZE);
  const lx = Math.floor((p.x - (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const rx = Math.floor((p.x + (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const fbCells = (scene === "boss_20f" || scene === "boss_40f") ? new Set() : new Set(fb.getCells().map(([x,y]) => `${x},${y}`));
  for (const cx of [lx, rx]) {
    if (cx < 0 || cx >= MAP_WIDTH) continue;
    if (fbCells.has(`${cx},${headGy}`) || (headGy >= 0 && headGy < MAP_HEIGHT && state.blockMap[headGy][cx] >= 1 && state.blockMap[headGy][cx] !== 9999)) {
      applyPlayerDamage(p); break;
    }
  }
}

function checkCrushHarddrop(state, p) {
  if (p.invincible > 0) return;
  const checkXs = [Math.floor((p.x - (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE), Math.floor((p.x + (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE)];
  const checkYs = [Math.floor((p.y - (P_HALF_H - 2) - GAME_TOP) / GRID_SIZE), Math.floor((p.y + (P_HALF_H - 2) - GAME_TOP) / GRID_SIZE)];
  for (const cy of checkYs) for (const cx of checkXs) {
    if (cx >= 0 && cx < MAP_WIDTH && cy >= 0 && cy < MAP_HEIGHT && state.blockMap[cy][cx] >= 1 && state.blockMap[cy][cx] !== 9999) {
      applyPlayerDamage(p); return;
    }
  }
}

function checkBoss20fGoal(state, p) {
  const corners = [
    [p.x - P_HALF_W + 2, p.y - P_HALF_H + 2], [p.x + P_HALF_W - 2, p.y - P_HALF_H + 2],
    [p.x - P_HALF_W + 2, p.y + P_HALF_H - 2], [p.x + P_HALF_W - 2, p.y + P_HALF_H - 2]
  ];
  for (const [px, py] of corners) {
    let gx = Math.floor((px - GAME_LEFT) / GRID_SIZE), gy = Math.floor((py - GAME_TOP) / GRID_SIZE);
    if (gx >= 0 && gx < MAP_WIDTH && gy >= 0 && gy < MAP_HEIGHT && state.blockMap[gy][gx] === 9999) return true;
  }
  return false;
}

function updateBeam(beam, player, forcedCycle = null) {
  if (scene === "boss_20f" || scene === "boss_40f") { beam.timer = 0; beam.phase = "wait"; return; }
  const currentCycle = forcedCycle !== null ? forcedCycle : getBeamCycle(state.floor);
  if (currentCycle === Infinity && !bossSys.isBossActive) { beam.timer = 0; beam.phase = "wait"; return; }
  let cycle = (bossSys.isBossActive && !bossSys.cursedBeamActive) ? 600 : currentCycle;
  beam.timer += 1;
  if (beam.phase === "wait" && beam.timer >= cycle - BEAM_WARNING) {
    beam.phase = "warning"; let pGx = Math.floor((player.x - GAME_LEFT) / GRID_SIZE);
    beam.col = Math.max(0, Math.min(MAP_WIDTH - BEAM_WIDTH, pGx - Math.floor(BEAM_WIDTH / 2)));
  }
  if (beam.phase === "warning") beam.blinkOn = (Math.floor(beam.timer / 8) % 2 === 0);
  if (beam.phase === "warning" && beam.timer >= cycle) { beam.phase = "firing"; beam.showTimer = BEAM_SHOW_FRAMES; beam.timer = 0; }
  if (beam.phase === "firing") {
    beam.showTimer -= 1;
    if (player.invincible === 0) {
      let pGx = Math.floor((player.x - GAME_LEFT) / GRID_SIZE);
      if (beam.col <= pGx && pGx < beam.col + BEAM_WIDTH) applyPlayerDamage(player);
    }
    if (beam.showTimer <= 0) beam.phase = "wait";
  }
}

function updateBlockMove(state, fb, bms) {
  if (scene === "boss_20f" || scene === "boss_40f") return;
  if (bms.leftHeld === bms.rightHeld) { bms.holdFrames = 0; bms.repeatAcc = 0; return; }
  const dir = bms.leftHeld ? -1 : 1;
  if (bms.holdFrames === 0 || (bms.holdFrames >= BLOCK_MOVE_INITIAL_DELAY && ++bms.repeatAcc >= BLOCK_MOVE_REPEAT_DELAY)) {
    if (bms.holdFrames > 0) bms.repeatAcc = 0; if (!checkCollision(state, fb, fb.x + dir, fb.y)) fb.x += dir;
  }
  bms.holdFrames += 1;
}

function updateFallingBlock(state, fb, isTutorial = false, tutState = null) {
  if (scene === "boss_20f" || scene === "boss_40f") return;
  const interval = state.keyStates.down ? BLOCK_FALL_INTERVAL_FAST : getFallInterval(state.floor);
  fb.timer += 1; if (fb.timer < interval) return;
  fb.timer = 0;
  if (!checkCollision(state, fb, fb.x, fb.y + 1)) fb.y += 1;
  else { lockBlock(state, fb); fb.spawnBlock(state, tutState, false, isTutorial); checkLineClear(state, true); }
}

function isSolidAll(state, fb, gx, gy) {
  if (gx < 0 || gx >= MAP_WIDTH || gy < 0 || gy >= MAP_HEIGHT) return false;
  if (state.blockMap[gy][gx] === 9999) return false;
  if (state.blockMap[gy][gx] >= 1) return true;
  if (scene === "boss_20f" || scene === "boss_40f") return false;
  for (const [fx,fy] of fb.getCells()) { if (fx === gx && fy === gy) return true; }
  return false;
}

function updatePlayer(state, fb, player) {
  const ks = state.keyStates; player.vx = 0;
  if (ks.a && ks.d) player.vx = (state.lastHkey === "a") ? -MOVE_SPEED : MOVE_SPEED;
  else if (ks.a) player.vx = -MOVE_SPEED; else if (ks.d) player.vx = MOVE_SPEED;

  const upperY = Math.floor((player.y - (P_HALF_H - 1) - GAME_TOP) / GRID_SIZE);
  const lowerY = Math.floor((player.y + (P_HALF_H - 1) - GAME_TOP) / GRID_SIZE);
  const nextLx = Math.floor((player.x + player.vx - (P_HALF_W - 1) - GAME_LEFT) / GRID_SIZE);
  const nextRx = Math.floor((player.x + player.vx + (P_HALF_W - 1) - GAME_LEFT) / GRID_SIZE);
  let hittingBlock = false, blockCache = null;

  for (const gridY of [upperY, lowerY]) {
    if (gridY < 0 || gridY >= MAP_HEIGHT) continue;
    if (player.vx < 0 && nextLx >= 0 && nextLx < MAP_WIDTH && state.blockMap[gridY][nextLx] >= 1 && state.blockMap[gridY][nextLx] !== 9999) {
      hittingBlock = true; let targetId = state.blockMap[gridY][nextLx];
      if (is_fixed_terrain(targetId)) { player.vx = 0; break; }
      if (!blockCache) blockCache = state.getBlockCache();
      let cells = blockCache[targetId] || [];
      let canPush = cells.every(([cx,cy]) => cx - 1 >= 0 && (state.blockMap[cy][cx-1] === 0 || state.blockMap[cy][cx-1] === targetId));
      player.pushTimerR = 0;
      if (canPush) {
        player.pushTimerL += 1;
        if (player.pushTimerL >= PUSH_DELAY) {
          cells.sort((a,b) => a[0]-b[0]).forEach(([cx,cy]) => { state.blockMap[cy][cx-1] = targetId; state.blockMap[cy][cx] = 0; });
          player.pushTimerL = 0; state.pushedBlockIds.add(targetId); state.pushGravityTimer = 0;
        } else player.vx = 0;
      } else player.vx = 0;
      break;
    }
    if (player.vx > 0 && nextRx >= 0 && nextRx < MAP_WIDTH && state.blockMap[gridY][nextRx] >= 1 && state.blockMap[gridY][nextRx] !== 9999) {
      hittingBlock = true; let targetId = state.blockMap[gridY][nextRx];
      if (is_fixed_terrain(targetId)) { player.vx = 0; break; }
      if (!blockCache) blockCache = state.getBlockCache();
      let cells = blockCache[targetId] || [];
      let canPush = cells.every(([cx,cy]) => cx + 1 < MAP_WIDTH && (state.blockMap[cy][cx+1] === 0 || state.blockMap[cy][cx+1] === targetId));
      player.pushTimerL = 0;
      if (canPush) {
        player.pushTimerR += 1;
        if (player.pushTimerR >= PUSH_DELAY) {
          cells.sort((a,b) => b[0]-a[0]).forEach(([cx,cy]) => { state.blockMap[cy][cx+1] = targetId; state.blockMap[cy][cx] = 0; });
          player.pushTimerR = 0; state.pushedBlockIds.add(targetId); state.pushGravityTimer = 0;
        } else player.vx = 0;
      } else player.vx = 0;
      break;
    }
  }

  player.x += player.vx; if (!hittingBlock) { player.pushTimerL = 0; player.pushTimerR = 0; }
  player.x = Math.max(GAME_LEFT + P_HALF_W, Math.min(GAME_RIGHT - P_HALF_W, player.x));

  if (!player.isGrounded) player.vy += GRAVITY;
  else { player.vy = 0; if (ks.w) { player.vy = JUMP_SPEED; player.isGrounded = false; } }
  player.y += player.vy; player.isGrounded = false;

  const lfootX = Math.floor((player.x - (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const rfootX = Math.floor((player.x + (P_HALF_W - 2) - GAME_LEFT) / GRID_SIZE);
  const headGy = Math.floor((player.y - P_HALF_H - GAME_TOP) / GRID_SIZE);
  const footGy = Math.floor((player.y + P_HALF_H - GAME_TOP) / GRID_SIZE);

  for (const cx of [lfootX, rfootX]) {
    if (cx < 0 || cx >= MAP_WIDTH) continue;
    if (player.vy >= 0 && footGy >= 0 && footGy < MAP_HEIGHT && isSolidAll(state, fb, cx, footGy)) { player.y = footGy * GRID_SIZE + GAME_TOP - P_HALF_H; player.isGrounded = true; break; }
    if (player.vy < 0 && headGy >= 0 && headGy < MAP_HEIGHT && isSolidAll(state, fb, cx, headGy)) { player.y = (headGy + 1) * GRID_SIZE + GAME_TOP + P_HALF_H; player.vy = 0; break; }
  }
  if (player.y > GAME_BOTTOM - P_HALF_H) { player.y = GAME_BOTTOM - P_HALF_H; player.isGrounded = true; }

  // 20F
  if (scene === "boss_20f" && checkBoss20fGoal(state, player)) {
    bossSys.isBossActive = false; bossSys.targetReached = true; scene = "game"; player.hp = MAX_HP;
    teleportPlayer(player); player.invincible = INVINCIBLE_FRAMES; bossSys.restorePreviousMap(state);
    state.floor = 21; state.floorLines = 0; state.notifiedFloor = 21; flushLineClearQueue(state, false);
  }

  if (player.invincible > 0) { player.invincible -= 1; player.blinkVisible = (Math.floor(player.invincible / 6) % 2 === 0); }
  else player.blinkVisible = true;
}

// ============================================================
// 描画
// ============================================================
function drawNextBlock(ctx, state) {
  if (!state.nextBlockData) return;
  const mapLeftX = GAME_RIGHT + 80; const mapRightX = SCREEN_WIDTH - 80; const mapCenterX = Math.floor((mapLeftX + mapRightX) / 2);
  const areaTop = GAME_TOP + 20; const areaH = 180;
  ctx.fillStyle = "#aaaaaa"; ctx.font = "bold 18px 'DotGothic16', sans-serif"; ctx.textAlign = "center"; ctx.fillText("NEXT", mapCenterX, areaTop + 35);

  const ndata = state.nextBlockData; const cellSize = 32;
  const minDx = Math.min(...ndata.shape.map(([dx]) => dx)), minDy = Math.min(...ndata.shape.map(([,dy]) => dy));
  const maxDx = Math.max(...ndata.shape.map(([dx]) => dx)), maxDy = Math.max(...ndata.shape.map(([,dy]) => dy));
  const blockW = (maxDx - minDx + 1) * cellSize, blockH = (maxDy - minDy + 1) * cellSize;
  const originX = mapCenterX - blockW / 2 - minDx * cellSize, originY = areaTop + 50 + (areaH - 50 - blockH) / 2 - minDy * cellSize;

  if (scene !== "boss_20f" && scene !== "boss_40f") {
    for (const [dx, dy] of ndata.shape) {
      ctx.fillStyle = ndata.color; ctx.fillRect(originX + dx * cellSize, originY + dy * cellSize, cellSize, cellSize);
      ctx.strokeStyle = ndata.outline; ctx.lineWidth = 1; ctx.strokeRect(originX + dx * cellSize, originY + dy * cellSize, cellSize, cellSize);
    }
  }
  ctx.strokeStyle = "#555555"; ctx.lineWidth = 1; ctx.strokeRect(mapLeftX, areaTop, mapRightX - mapLeftX, areaH);

  if (scene.startsWith("boss_")) {
    const placeholderTop = areaTop + areaH + 40; ctx.fillStyle = "#222233"; ctx.fillRect(mapLeftX, placeholderTop, mapRightX - mapLeftX, 300);
    ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.strokeRect(mapLeftX, placeholderTop, mapRightX - mapLeftX, 300);
    ctx.fillStyle = "white"; ctx.font = "bold 14px 'DotGothic16', sans-serif"; ctx.textAlign = "center";
    let bossFile = scene === "boss_10f" ? "boss10.png" : scene === "boss_20f" ? "boss20.png" : scene === "boss_30f" ? "boss30.png" : "boss40.png";
    ctx.fillText("[ BOSS STANDING IMAGE ]", mapCenterX, placeholderTop + 145); ctx.fillText(`(assets/${bossFile})`, mapCenterX, placeholderTop + 170);
  }
}

function drawGame(ctx, state, fb, player, beam, hideFallingBlock = false, forceBeamActive = false) {
  if (state.bgAnim && state.bgAnim.active) {
    ctx.save(); ctx.beginPath(); ctx.rect(GAME_LEFT, GAME_TOP, GAME_RIGHT - GAME_LEFT, GAME_BOTTOM - GAME_TOP); ctx.clip();
    ctx.fillStyle = state.bgAnim.color; ctx.font = "bold 130px 'DotGothic16', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(state.bgAnim.text, (GAME_LEFT + GAME_RIGHT) / 2, state.bgAnim.y); ctx.restore();
  }

  // グリッド
  ctx.strokeStyle = "#333333"; ctx.lineWidth = 1; ctx.setLineDash([8, 10]);
  for (let gx = 0; gx <= MAP_WIDTH; gx++) { ctx.beginPath(); ctx.moveTo(GAME_LEFT + gx * GRID_SIZE, GAME_TOP); ctx.lineTo(GAME_LEFT + gx * GRID_SIZE, GAME_BOTTOM); ctx.stroke(); }
  for (let gy = 0; gy <= MAP_HEIGHT; gy++) { ctx.beginPath(); ctx.moveTo(GAME_LEFT, GAME_TOP + gy * GRID_SIZE); ctx.lineTo(GAME_RIGHT, GAME_TOP + gy * GRID_SIZE); ctx.stroke(); }
  ctx.setLineDash([]);

  // ビーム
  if (scene !== "boss_20f" && scene !== "boss_40f") {
    let currentCycle = getBeamCycle(state.floor); if (scene === "boss_10f") currentCycle = 1800;
    if (forceBeamActive || currentCycle !== Infinity || bossSys.isBossActive) {
      if (beam.phase === "warning" && beam.blinkOn) { ctx.fillStyle = "#550000"; ctx.fillRect(GAME_LEFT + beam.col * GRID_SIZE, GAME_TOP, BEAM_WIDTH * GRID_SIZE, GAME_BOTTOM - GAME_TOP); }
      if (beam.phase === "firing") {
        ctx.fillStyle = "#ff2200"; ctx.fillRect(GAME_LEFT + beam.col * GRID_SIZE, GAME_TOP, BEAM_WIDTH * GRID_SIZE, GAME_BOTTOM - GAME_TOP);
        ctx.fillStyle = "#ffffff"; ctx.fillRect(GAME_LEFT + beam.col * GRID_SIZE + 4, GAME_TOP, BEAM_WIDTH * GRID_SIZE - 8, GAME_BOTTOM - GAME_TOP);
      }
    }
  }

  // 30F ビーム
  if (scene === "boss_30f") {
    if (bossSys.bigBeamPhase === "warning" && Math.floor(bossSys.bigBeamTimer / 4) % 2 === 0) { ctx.fillStyle = "#661111"; ctx.fillRect(GAME_LEFT + GRID_SIZE, GAME_TOP, (MAP_WIDTH - 2) * GRID_SIZE, GAME_BOTTOM - GAME_TOP); }
    if (bossSys.bigBeamPhase === "firing") {
      ctx.fillStyle = "#ff2200"; ctx.fillRect(GAME_LEFT + GRID_SIZE, GAME_TOP, (MAP_WIDTH - 2) * GRID_SIZE, GAME_BOTTOM - GAME_TOP);
      ctx.fillStyle = "#ffffff"; ctx.fillRect(GAME_LEFT + GRID_SIZE + 6, GAME_TOP, (MAP_WIDTH - 2) * GRID_SIZE - 12, GAME_BOTTOM - GAME_TOP);
    }
  }

  // 40F ビーム
  if (scene === "boss_40f") {
    let blink = Math.floor(Date.now() / 130) % 2 === 0;
    for (let cx of bossSys.boss40ActiveCols) {
      if (bossSys.boss40LaserPhase === "warning" && blink) { ctx.fillStyle = "#550000"; ctx.fillRect(GAME_LEFT + cx * GRID_SIZE, GAME_TOP, GRID_SIZE, GAME_BOTTOM - GAME_TOP); }
      else if (bossSys.boss40LaserPhase === "firing") { ctx.fillStyle = "#ff2200"; ctx.fillRect(GAME_LEFT + cx * GRID_SIZE, GAME_TOP, GRID_SIZE, GAME_BOTTOM - GAME_TOP); ctx.fillStyle = "#ffffff"; ctx.fillRect(GAME_LEFT + cx * GRID_SIZE + 6, GAME_TOP, GRID_SIZE - 12, GAME_BOTTOM - GAME_TOP); }
    }
    for (let cy of bossSys.boss40ActiveRows) {
      if (bossSys.boss40LaserPhase === "warning" && blink) { ctx.fillStyle = "#550000"; ctx.fillRect(GAME_LEFT, GAME_TOP + cy * GRID_SIZE, GAME_RIGHT - GAME_LEFT, GRID_SIZE); }
      else if (bossSys.boss40LaserPhase === "firing") { ctx.fillStyle = "#ff2200"; ctx.fillRect(GAME_LEFT, GAME_TOP + cy * GRID_SIZE, GAME_RIGHT - GAME_LEFT, GRID_SIZE); ctx.fillStyle = "#ffffff"; ctx.fillRect(GAME_LEFT + 6, GAME_TOP + cy * GRID_SIZE + 6, GAME_RIGHT - GAME_LEFT - 12, GRID_SIZE - 12); }
    }
  }

  // 盤面ブロック
  let goalFlash = Math.floor(Date.now() / 250) % 2 === 0;
  for (let y = 0; y < MAP_HEIGHT; y++) {
    for (let x = 0; x < MAP_WIDTH; x++) {
      let val = state.blockMap[y][x];
      if (val === 9999) {
        ctx.fillStyle = goalFlash ? "#ffff33" : "#cccc00"; ctx.fillRect(GAME_LEFT + x * GRID_SIZE, GAME_TOP + y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = "#ffffbb"; ctx.lineWidth = 1; ctx.strokeRect(GAME_LEFT + x * GRID_SIZE, GAME_TOP + y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
      } else if (val >= 1) {
        let col = is_fixed_terrain(val) ? { fill:"gray", outline:"#444444" } : (BLOCK_COLOR_MAP[Math.floor(val / 1000)] || { fill:"#888888", outline:"#444444" });
        ctx.fillStyle = col.fill; ctx.fillRect(GAME_LEFT + x * GRID_SIZE, GAME_TOP + y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = col.outline; ctx.lineWidth = 1; ctx.strokeRect(GAME_LEFT + x * GRID_SIZE, GAME_TOP + y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
      }
    }
  }

  // 30F パズルお題オーバーレイ
  if (scene === "boss_30f" && bossSys.puzzleMap) {
    let blink = Math.floor(Date.now() / 100) % 2 === 0;
    for (let y = 0; y < MAP_HEIGHT; y++) {
      for (let x = 0; x < MAP_WIDTH; x++) {
        let pval = bossSys.puzzleMap[y][x]; if (pval === 0 || state.blockMap[y][x] >= 1) continue;
        ctx.save(); ctx.globalAlpha = 0.5;
        if (pval === PUZZLE_BLUE_ID) { ctx.fillStyle = "#2255ff"; ctx.fillRect(GAME_LEFT + x * GRID_SIZE + 2, GAME_TOP + y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4); ctx.strokeStyle = "#77aaff"; ctx.strokeRect(GAME_LEFT + x * GRID_SIZE + 2, GAME_TOP + y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4); }
        else if (pval === PUZZLE_RED_ID) { if (!bossSys.trapActive || blink) { ctx.fillStyle = !bossSys.trapActive ? "#ff2222" : "#ffffff"; ctx.fillRect(GAME_LEFT + x * GRID_SIZE + 2, GAME_TOP + y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4); ctx.strokeStyle = "#ff8888"; ctx.strokeRect(GAME_LEFT + x * GRID_SIZE + 2, GAME_TOP + y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4); } }
        ctx.restore();
      }
    }
  }

  // 落下ブロック
  if (!hideFallingBlock && scene !== "boss_20f" && scene !== "boss_40f") {
    let gc = fb.getGhostCells(state);
    if (gc.length > 0) {
      let gf = darkenColor(fb.color, 0.28), go = darkenColor(fb.outline || fb.color, 0.45), fbc = new Set(fb.getCells().map(([x,y]) => `${x},${y}`));
      for (const [gx,gy] of gc) {
        if (fbc.has(`${gx},${gy}`)) continue; ctx.fillStyle = gf; ctx.fillRect(GAME_LEFT + gx * GRID_SIZE + 2, GAME_TOP + gy * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
        ctx.strokeStyle = go; ctx.lineWidth = 2; ctx.strokeRect(GAME_LEFT + gx * GRID_SIZE + 2, GAME_TOP + gy * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
      }
    }
    for (const [gx,gy] of fb.getCells()) { ctx.fillStyle = fb.color; ctx.fillRect(GAME_LEFT + gx * GRID_SIZE, GAME_TOP + gy * GRID_SIZE, GRID_SIZE, GRID_SIZE); ctx.strokeStyle = fb.outline; ctx.lineWidth = 1; ctx.strokeRect(GAME_LEFT + gx * GRID_SIZE, GAME_TOP + gy * GRID_SIZE, GRID_SIZE, GRID_SIZE); }
  }

  // プレイヤー

// ============================================================
// メインループ ＆ イベント
// ============================================================
let state, tutState, fb, player, beam, bms;
function resetGame() {
  state = new GameState(); tutState = new TutorialState(); fb = new FallingBlock(); player = new Player(); beam = new BeamState(); bms = new BlockMoveState(); bossSys.reset_all();
}
resetGame();

const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
let _lastTime = null, _accumulator = 0;

function mainProc(timestamp) {
  requestAnimationFrame(mainProc); if (_lastTime === null) _lastTime = timestamp;
  _accumulator += timestamp - _lastTime; _lastTime = timestamp;
  if (_accumulator < 16.66) return; _accumulator = 0;

  ctx.fillStyle = "#111122"; ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

  if (scene === "title") drawTitle(ctx);
  else if (scene === "quit") drawQuit(ctx);
  else if (sceneover(scene)) drawGameover(ctx, state.score, state.floor);
  else if (scene === "pause") { drawGame(ctx, state, fb, player, beam); drawPause(ctx); }
  else {
    const isTut = (scene === "tutorial"); let tutorialPaused = false, blockFrozen = false, isBeamStep = false;
    if (isTut) {
      if (tutState._needsSetup) tutSetupStep(tutState, state, player, fb, beam);
      let sd = tutState.currentStepData();
      if (sd) { if (sd.condition_type !== "beam_evade") beam.timer = 0; else { isBeamStep = true; if (beam.phase === "firing" && beam.showTimer === 1) tutState.flags.beam_fired = true; } }
      tutorialPaused = tutState.isWaitingForAck(); blockFrozen = tutState.isBlockFrozen();
    }

    if (!tutorialPaused) {
      if (state.downDoubleTapTimer > 0) state.downDoubleTapTimer--;
      if (state.comboTimer > 0 && --state.comboTimer <= 0) { if (state.pendingComboBlocks > 0) { state.comboBlocks += state.pendingComboBlocks; state.pendingComboBlocks = 0; } state.comboTimer = 0; state.comboCount = 0; state.comboTotalLines = 0; }
      
      // ボス空間移行判定
      if (state.floor === 10 && !bossSys.isBossActive && scene === "game" && !bossSys.cursedBeamActive) { flushLineClearQueue(state); bossSys.generateBossStage(state, 10); scene = "boss_10f"; teleportPlayer(player); player.invincible = INVINCIBLE_FRAMES; beam.phase = "wait"; beam.timer = 0; }
      else if (state.floor === 20 && !bossSys.isBossActive && scene === "game" && !bossSys.targetReached) { flushLineClearQueue(state); bossSys.generateBossStage(state, 20); scene = "boss_20f"; teleportPlayerBoss20(player); player.invincible = INVINCIBLE_FRAMES; }
      else if (state.floor === 30 && !bossSys.isBossActive && scene === "game" && !bossSys.boss30Cleared) { flushLineClearQueue(state); bossSys.generateBossStage(state, 30); scene = "boss_30f"; teleportPlayer(player); player.invincible = INVINCIBLE_FRAMES; }
      else if (state.floor === 40 && !bossSys.isBossActive && scene === "game" && !bossSys.boss40Cleared) { flushLineClearQueue(state); bossSys.generateBossStage(state, 40); scene = "boss_40f"; teleportPlayerBoss20(player); player.invincible = INVINCIBLE_FRAMES; }

      // ボス固有更新処理
      if (scene === "boss_20f") { bossSys.bossTimer--; if (bossSys.bossTimer <= 0) scene = "gameover"; }
      else if (scene === "boss_30f") {
        let pGx = Math.floor((player.x - GAME_LEFT) / GRID_SIZE);
        let res = bossSys.update_boss30_logic(state, pGx, player.invincible);
        if (res === "damage") { applyPlayerDamage(player); bossSys.reset_30f_round(state); flushLineClearQueue(state, false); }
        else if (res === "victory") { bossSys.isBossActive = false; bossSys.boss30Cleared = true; scene = "game"; player.hp = MAX_HP; teleportPlayer(player); player.invincible = INVINCIBLE_FRAMES; bossSys.restorePreviousMap(state); state.floor = 31; state.floorLines = 0; state.notifiedFloor = 31; flushLineClearQueue(state, false); }
        else if (res === "advance") flushLineClearQueue(state, false);
      } else if (scene === "boss_40f") {
        let res = bossSys.update_boss40_logic(player);
        if (res === "clear") { bossSys.isBossActive = false; bossSys.boss40Cleared = true; scene = "game"; player.hp = MAX_HP; teleportPlayer(player); player.invincible = INVINCIBLE_FRAMES; bossSys.restorePreviousMap(state); state.floor = 41; state.floorLines = 0; state.notifiedFloor = 41; flushLineClearQueue(state, false); }
        if (bossSys.boss40LaserPhase === "firing" && player.invincible === 0) {
          let pGx = Math.floor((player.x - GAME_LEFT) / GRID_SIZE), pGy = Math.floor((player.y - GAME_TOP) / GRID_SIZE);
          if (bossSys.boss40ActiveCols.includes(pGx) || bossSys.boss40ActiveRows.includes(pGy)) applyPlayerDamage(player);
        }
      }

      // 階層背景演出
      if (state.floor > state.notifiedFloor && state.comboTimer <= 0 && state.lineClearQueue.length === 0 && !scene.startsWith("boss_")) {
        state.notifiedFloor = state.floor; let colors = ["hsla(0,40%,25%,0.4)","hsla(120,40%,25%,0.4)","hsla(210,40%,25%,0.4)"];
        state.bgAnim = { active: true, y: GAME_TOP - 150, text: `${state.floor}${getOrdinal(state.floor)} FLOOR`, color: colors[Math.floor(Math.random()*colors.length)] };
      }
      if (state.bgAnim && state.bgAnim.active) { state.bgAnim.y += 4; if (state.bgAnim.y > GAME_BOTTOM + 200) state.bgAnim.active = false; }

      processLineClearQueue(state); updateBlockMove(state, fb, bms);
      if (!blockFrozen) updateFallingBlock(state, fb, isTut, isTut ? tutState : null);
      updatePlayer(state, fb, player); applyGravityPushOnly(state, fb); checkCrush(state, fb, player);
      updateBeam(beam, player, isBeamStep ? 1800 : null);
    }
    if (isTut) tutCheckStepCondition(tutState, state, player, fb, beam);
    drawGame(ctx, state, fb, player, beam, blockFrozen, isBeamStep);
    if (isTut) tutDrawOverlay(ctx, tutState, SCREEN_WIDTH, SCREEN_HEIGHT, GAME_LEFT, GAME_TOP, GAME_RIGHT, GAME_BOTTOM);
  }
}

function sceneover(s) { return s === "gameover"; }

function getKey(code) {
  const map = { "KeyW":"w","KeyA":"a","KeyS":"s","KeyD":"d","KeyE":"e","ArrowLeft":"left","ArrowRight":"right","ArrowDown":"down","ArrowUp":"up","Space":"space","Escape":"escape","KeyF":"f" };
  return map[code] || code.toLowerCase().replace("key","");
}

document.addEventListener("keydown", e => {
  const sym = getKey(e.code); if (["space","down","up","left","right"].includes(sym)) e.preventDefault();
  if (scene === "title" || scene === "gameover" || scene === "quit") return;
  if (scene === "pause") { if (sym === "escape") scene = prevScene; return; }
  if (sym === "escape") { prevScene = scene; scene = "pause"; return; }

  if (scene === "tutorial") {
    let sd = tutState.currentStepData(); if (!sd) return;
    if (!tutState.started) { if (sym === "f") { tutState.started = true; if (sd.condition_type === "wait_input") tutState.setCleared(); } return; }
    if (tutState.isCleared && sym === "f") { tutState.advance(); if (!tutState.currentStepData()) { resetGame(); scene = "game"; } else tutSetupStep(tutState, state, player, fb, beam); return; }
    if (sd.allowed_keys && !sd.allowed_keys.includes("all") && !sd.allowed_keys.includes(sym)) return;
    if (sym === "w") tutState.flags.jumped = true; if (sym === "space") tutState.flags.rotated = true;
  }

  if (sym === "e") { useComboBlock(state, fb); return; }
  if (sym === "down" && !state.keyStates.down && scene !== "boss_20f" && scene !== "boss_40f") {
    if (state.downDoubleTapTimer > 0) {
      if (++state.downPressCount >= 2) {
        while (!checkCollision(state, fb, fb.x, fb.y + 1)) fb.y++;
        lockBlock(state, fb); fb.spawnBlock(state, scene === "tutorial" ? tutState : null, false, scene === "tutorial");
        checkLineClear(state, true); checkCrushHarddrop(state, player); state.downPressCount = 0; state.downDoubleTapTimer = 0;
        if (scene === "tutorial") tutState.flags.hard_dropped = true;
      }
    } else { state.downPressCount = 1; state.downDoubleTapTimer = 15; }
    state.keyStates.down = true; if (scene === "tutorial") tutState.flags.down_pressed = true;
  }
  if (sym in state.keyStates) state.keyStates[sym] = true;
  if (sym === "a" || sym === "d") state.lastHkey = sym;
  if (sym === "space" && scene !== "boss_20f" && scene !== "boss_40f") fb.rotateLeft(state);
  if (sym === "left" && scene !== "boss_20f" && scene !== "boss_40f") { if (!bms.leftHeld) { bms.leftHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; } bms.rightHeld = false; }
  if (sym === "right" && scene !== "boss_20f" && scene !== "boss_40f") { if (!bms.rightHeld) { bms.rightHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; } bms.leftHeld = false; }
});

document.addEventListener("keyup", e => {
  const sym = getKey(e.code); if (sym in state.keyStates) state.keyStates[sym] = false;
  if (sym === "left") { bms.leftHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
  if (sym === "right") { bms.rightHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
});

function getCanvasPos(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (SCREEN_WIDTH / r.width), y: (e.clientY - r.top) * (SCREEN_HEIGHT / r.height) }; }

canvas.addEventListener("mousedown", e => {
  e.preventDefault(); const { x, y } = getCanvasPos(e);
  if (e.button === 0) {
    if (scene === "title") { if (hitBtn("btn_play", x, y)) { resetGame(); scene = "game"; } else if (hitBtn("btn_tutorial", x, y)) { resetGame(); tutState.reset(); tutSetupStep(tutState, state, player, fb, beam); scene = "tutorial"; } else if (hitBtn("btn_quit", x, y)) { quitGame(); } return; }
    if (scene === "pause") { if (hitBtn("btn_resume", x, y)) scene = prevScene; else if (hitBtn("btn_retry_pause", x, y)) { resetGame(); if (prevScene === "tutorial") { tutState.reset(); tutSetupStep(tutState, state, player, fb, beam); scene = "tutorial"; } else scene = "game"; } else if (hitBtn("btn_home_pause", x, y)) scene = "title"; else if (hitBtn("btn_quit_pause", x, y)) { quitGame(); } return; }
    if (scene === "gameover") { if (hitBtn("btn_retry_go", x, y)) { resetGame(); scene = "game"; } else if (hitBtn("btn_home_go", x, y)) scene = "title"; else if (hitBtn("btn_quit_go", x, y)) { quitGame(); } return; }
    if (!bms.leftHeld) { bms.leftHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; } bms.rightHeld = false;
  }
  if (e.button === 2) { if (!bms.rightHeld) { bms.rightHeld = true; bms.holdFrames = 0; bms.repeatAcc = 0; } bms.leftHeld = false; }
});

canvas.addEventListener("mouseup", e => {
  if (e.button === 0) { bms.leftHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
  if (e.button === 1) state.keyStates.down = false;
  if (e.button === 2) { bms.rightHeld = false; bms.holdFrames = 0; bms.repeatAcc = 0; }
});
canvas.addEventListener("contextmenu", e => e.preventDefault());

function scaleCanvas() { const scale = Math.min(window.innerWidth / SCREEN_WIDTH, window.innerHeight / SCREEN_HEIGHT); document.getElementById("wrapper").style.transform = `scale(${scale})`; }
window.addEventListener("resize", scaleCanvas); scaleCanvas(); requestAnimationFrame(mainProc);
</script>
</body>
